name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "package.json"
      - "README.md"
      - ".github/workflows/build-desktop.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: openclaw-control-macos
            build_args: --mac zip
          - os: windows-latest
            artifact_name: openclaw-control-windows
            build_args: --win portable

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: npm run dist -- ${{ matrix.build_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/**
